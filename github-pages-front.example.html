<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文化祭受付システム (GitHub Pages)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen p-4">
  <div class="max-w-5xl mx-auto">
    <h1 class="text-4xl font-bold text-blue-700 mb-6 text-center">文化祭受付システム</h1>

    <div id="reader" class="w-full h-[360px] bg-black rounded-lg overflow-hidden mb-6"></div>
    <div id="status" class="text-xl text-gray-700 mb-4">読み込み中...</div>
    <div id="result" class="bg-white border border-gray-300 rounded-lg p-4 text-lg text-center min-h-[110px]">QRコードをスキャンしてください</div>

    <div class="mt-6 grid gap-4 md:grid-cols-2">
      <select id="programSelect" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></select>
      <button id="restartButton" class="px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">再開</button>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.2/html5-qrcode.min.js"></script>
  <script type="module">
    import { getProgramList, processQrCode, writeEntryTime } from './github-pages-api.js';

    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const programSelect = document.getElementById('programSelect');
    const restartButton = document.getElementById('restartButton');
    const readerId = 'reader';

    let html5QrCode = null;
    let isProcessingScan = false;
    let selectedProgramKey = null;

    async function init() {
      statusDiv.innerText = '公演情報を読み込み中...';
      try {
        const programs = await getProgramList();
        populateProgramSelect(programs);
        statusDiv.innerText = 'カメラを起動中...';
        await startScanner();
      } catch (err) {
        statusDiv.innerText = `読み込みエラー: ${err.message}`;
        console.error(err);
      }
    }

    function populateProgramSelect(programs) {
      programSelect.innerHTML = '';
      if (!Array.isArray(programs) || programs.length === 0) {
        programSelect.innerHTML = '<option value="">公演情報がありません</option>';
        selectedProgramKey = null;
        return;
      }

      programs.forEach(program => {
        const option = document.createElement('option');
        option.value = program.compositeKey;
        option.textContent = `${program.name} (${program.time})`;
        programSelect.appendChild(option);
      });
      selectedProgramKey = programs[0].compositeKey;
      programSelect.value = selectedProgramKey;
    }

    programSelect.addEventListener('change', () => {
      selectedProgramKey = programSelect.value;
    });

    restartButton.addEventListener('click', async () => {
      if (html5QrCode && !html5QrCode.isScanning) {
        await startScanner();
      }
    });

    async function startScanner() {
      if (html5QrCode && html5QrCode.isScanning) {
        return;
      }
      html5QrCode = new Html5Qrcode(readerId, { verbose: false });
      try {
        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
          throw new Error('カメラが見つかりませんでした。');
        }
        const cameraId = cameras[0].id;
        await html5QrCode.start(
          cameraId,
          { fps: 10, qrbox: 250 },
          onScanSuccess,
          onScanError
        );
        statusDiv.innerText = 'スキャン中...';
      } catch (err) {
        statusDiv.innerText = `カメラ起動エラー: ${err.message}`;
        console.error(err);
      }
    }

    async function onScanSuccess(decodedText) {
      if (isProcessingScan) return;
      isProcessingScan = true;
      statusDiv.innerText = '照合中...';
      resultDiv.textContent = 'QRコードを読み取りました。';

      try {
        if (!selectedProgramKey) {
          throw new Error('対象公演が選択されていません。');
        }

        const response = await processQrCode(decodedText, selectedProgramKey);
        if (response.success) {
          resultDiv.innerHTML = `
            <p class="text-green-700 text-xl font-bold">入場許可</p>
            <p>氏名: <strong>${response.data.C_Name}</strong></p>
            <p>演目: <strong>${response.data.J_ProgramName}</strong></p>
            <p>日時: <strong>${response.data.K_DesiredTime}</strong></p>
            <p>入場時刻: <strong>${response.data.AdmissionTime || '未設定'}</strong></p>
          `;
          await writeEntryTime(decodedText);
        } else {
          resultDiv.innerHTML = `<span class="text-red-600">${response.message}</span>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<span class="text-red-600">通信エラー: ${err.message}</span>`;
        console.error(err);
      } finally {
        isProcessingScan = false;
      }
    }

    function onScanError(errorMessage) {
      console.warn('スキャンエラー:', errorMessage);
    }

    init();
  </script>
</body>
</html>
